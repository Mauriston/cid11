<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CID-11 — Busca em Português</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Carlito:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --md-primary: #050f41;
      --md-on-primary: #ffffff;
      --md-primary-container: #d9e2ff;
      --md-on-primary-container: #00105c;
      --md-secondary: #5a5d72;
      --md-on-secondary: #ffffff;
      --md-secondary-container: #dfe1f9;
      --md-on-secondary-container: #171a2c;
      --md-surface: #fafafa;
      --md-surface-variant: #e3e1ec;
      --md-on-surface: #1b1b1f;
      --md-on-surface-variant: #46464f;
      --md-outline: #767680;
      --md-outline-variant: #c7c5d0;
      --md-background: #f4f4f8;
      --md-error: #ba1a1a;
      --md-fav: #e53935;
      --md-scrim: rgba(0,0,0,0.32);
      --md-elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
      --md-elevation-2: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
      --md-curve: cubic-bezier(0.2, 0, 0, 1);
    }

    body {
      font-family: 'Carlito', sans-serif;
      background: var(--md-background);
      color: var(--md-on-surface);
      min-height: 100vh;
    }

    /* ── Progress bar ─────────────────────────────── */
    #progress-bar {
      width: 100%;
      height: 3px;
      background: transparent;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 200;
    }
    #progress-fill {
      height: 100%;
      background: var(--md-primary-container);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ── Header / Top App Bar ─────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--md-primary);
      padding: 12px 16px 14px;
      transition: box-shadow 200ms var(--md-curve);
    }
    header.scrolled {
      box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .header-icon {
      font-family: 'Material Symbols Outlined';
      font-size: 28px;
      color: var(--md-on-primary);
      line-height: 1;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 28;
    }
    .header-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 1.15rem;
      color: var(--md-on-primary);
      line-height: 1.2;
    }
    .header-subtitle {
      font-family: 'Carlito', sans-serif;
      font-weight: 400;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.3;
    }

    /* ── MD3 Search bar (Filled pill) ─────────────── */
    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-leading-icon {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      color: var(--md-on-surface-variant);
      pointer-events: none;
      z-index: 1;
    }
    .search-leading-icon .material-symbols-outlined {
      font-size: 22px;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    #search-input {
      width: 100%;
      height: 56px;
      padding: 0 52px 0 52px;
      border: none;
      border-radius: 28px;
      font-family: 'Carlito', sans-serif;
      font-size: 1rem;
      background: rgba(255,255,255,0.97);
      color: var(--md-on-surface);
      outline: none;
      transition: background 200ms var(--md-curve), outline 200ms var(--md-curve);
    }
    #search-input:focus {
      background: #ffffff;
      outline: 2px solid var(--md-primary);
    }
    #search-input::placeholder { color: var(--md-on-surface-variant); }

    #clear-btn {
      position: absolute;
      right: 8px;
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--md-on-surface-variant);
      transition: background 200ms var(--md-curve);
    }
    #clear-btn:hover { background: rgba(0,0,0,0.08); }
    #clear-btn.visible { display: flex; }
    #clear-btn .material-symbols-outlined {
      font-size: 20px;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
    }

    /* ── Filter tabs (Busca / Favoritos) ──────────── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      padding: 12px 16px 0;
      max-width: 800px;
      margin: 0 auto;
    }
    .filter-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 16px;
      border-radius: 18px;
      border: 1px solid var(--md-outline-variant);
      background: var(--md-surface);
      color: var(--md-on-surface-variant);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 200ms var(--md-curve), color 200ms var(--md-curve), border-color 200ms var(--md-curve);
    }
    .filter-tab .material-symbols-outlined {
      font-size: 18px;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      transition: font-variation-settings 200ms var(--md-curve);
    }
    .filter-tab:hover {
      background: rgba(5,15,65,0.06);
      border-color: var(--md-outline);
    }
    .filter-tab.active {
      background: var(--md-primary-container);
      color: var(--md-on-primary-container);
      border-color: var(--md-primary-container);
      font-weight: 600;
    }
    .filter-tab.active .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 20;
    }
    .fav-count {
      display: none;
      background: var(--md-fav);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      padding: 0 5px;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .fav-count.visible { display: flex; }

    /* ── Main content ─────────────────────────────── */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 12px 16px 16px;
    }

    #status-bar {
      font-family: 'Carlito', sans-serif;
      font-size: 0.85rem;
      color: var(--md-on-surface-variant);
      margin-bottom: 12px;
      min-height: 20px;
      display: flex;
      align-items: center;
    }

    /* ── Loading ──────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 16px;
      gap: 20px;
    }
    .md-circular-progress {
      width: 48px;
      height: 48px;
      animation: md-rotate 1.4s linear infinite;
    }
    .md-circular-progress circle {
      cx: 24; cy: 24; r: 20;
      fill: none;
      stroke: var(--md-primary);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 80 45;
      animation: md-dash 1.4s ease-in-out infinite;
    }
    @keyframes md-rotate { to { transform: rotate(360deg); } }
    @keyframes md-dash {
      0%   { stroke-dasharray: 1 124;  stroke-dashoffset: 0; }
      50%  { stroke-dasharray: 100 25; stroke-dashoffset: -30; }
      100% { stroke-dasharray: 100 25; stroke-dashoffset: -124; }
    }
    .loading-text {
      font-family: 'Carlito', sans-serif;
      color: var(--md-on-surface-variant);
      font-size: 0.95rem;
    }

    /* ── Results ──────────────────────────────────── */
    #results {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── MD3 Elevated Card ────────────────────────── */
    .card {
      background: var(--md-surface);
      border-radius: 12px;
      box-shadow: var(--md-elevation-1);
      overflow: hidden;
      transition: box-shadow 200ms var(--md-curve);
      cursor: pointer;
      position: relative;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: var(--md-primary);
      opacity: 0;
      transition: opacity 200ms var(--md-curve);
      pointer-events: none;
    }
    .card:hover { box-shadow: var(--md-elevation-2); }
    .card:hover::after { opacity: 0.08; }

    .card .ripple {
      position: absolute;
      border-radius: 50%;
      background: var(--md-primary);
      opacity: 0.12;
      transform: scale(0);
      animation: ripple-expand 400ms var(--md-curve) forwards;
      pointer-events: none;
      z-index: 5;
    }
    @keyframes ripple-expand { to { transform: scale(4); opacity: 0; } }

    .card-header {
      padding: 14px 16px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-height: 44px;
      position: relative;
      z-index: 1;
    }

    /* ── CID Badge ────────────────────────────────── */
    .cid-badge {
      flex-shrink: 0;
      background: var(--md-primary-container);
      color: var(--md-on-primary-container);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 8px;
      letter-spacing: 0.3px;
      margin-top: 1px;
      white-space: nowrap;
    }
    .cid-badge.category {
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
      font-size: 0.7rem;
    }

    .card-name {
      font-family: 'Carlito', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--md-on-surface);
      flex: 1;
    }

    /* ── Favorite button ──────────────────────────── */
    .fav-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-outline);
      transition: background 200ms var(--md-curve), color 200ms var(--md-curve);
      position: relative;
      z-index: 2;
    }
    .fav-btn .material-symbols-outlined {
      font-size: 20px;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      transition: font-variation-settings 200ms var(--md-curve), color 200ms var(--md-curve);
    }
    .fav-btn:hover { background: rgba(229,57,53,0.1); color: var(--md-fav); }
    .fav-btn.active { color: var(--md-fav); }
    .fav-btn.active .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 20;
    }

    .expand-icon {
      flex-shrink: 0;
      color: var(--md-on-surface-variant);
      transition: transform 200ms var(--md-curve);
      margin-top: 1px;
      font-family: 'Material Symbols Outlined';
      font-size: 22px;
      line-height: 1;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      user-select: none;
    }
    .card.expanded .expand-icon { transform: rotate(180deg); }

    /* ── Breadcrumb chips ─────────────────────────── */
    .card-breadcrumb {
      padding: 0 16px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .breadcrumb-item {
      font-family: 'Carlito', sans-serif;
      font-size: 0.75rem;
      color: var(--md-on-surface-variant);
      background: transparent;
      border: 1px solid var(--md-outline-variant);
      padding: 2px 8px;
      border-radius: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }
    .breadcrumb-sep { font-size: 0.7rem; color: var(--md-outline-variant); }

    /* ── Description preview ──────────────────────── */
    .card-desc-preview {
      padding: 0 16px 14px;
      font-family: 'Carlito', sans-serif;
      font-size: 0.875rem;
      color: var(--md-on-surface-variant);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .card.expanded .card-desc-preview { display: none; }
    .card.expanded .card-breadcrumb   { display: none; }

    /* ── Card details (expanded, animated) ───────── */
    .card-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 280ms var(--md-curve);
      border-top: 0px solid var(--md-outline-variant);
      background: var(--md-surface);
    }
    .card.expanded .card-details {
      max-height: 2000px;
      border-top-width: 1px;
    }
    .card-details-inner { padding: 14px 16px; }

    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding-top: 14px;
      border-top: 1px solid var(--md-outline-variant);
    }
    .detail-row:first-child { padding-top: 0; border-top: none; }

    .detail-body { flex: 1; min-width: 0; }
    .detail-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--md-on-surface-variant);
      margin-bottom: 3px;
    }
    .detail-value {
      font-family: 'Carlito', sans-serif;
      font-size: 0.9rem;
      color: var(--md-on-surface);
      line-height: 1.6;
      word-break: break-word;
    }
    .detail-cid {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--md-primary);
    }

    /* ── Copy button ──────────────────────────────── */
    .copy-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--md-on-surface-variant);
      transition: background 200ms var(--md-curve), color 200ms var(--md-curve);
      align-self: flex-start;
      margin-top: 12px;
    }
    .detail-row:first-child .copy-btn { margin-top: 0; }
    .copy-btn:hover { background: rgba(5,15,65,0.08); color: var(--md-primary); }
    .copy-btn:active { background: rgba(5,15,65,0.12); }
    .copy-btn.copied { color: #2e7d32; background: #e8f5e9; }
    .copy-btn .material-symbols-outlined {
      font-size: 20px;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
    }

    /* ── Empty state ──────────────────────────────── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 16px;
      gap: 12px;
      text-align: center;
    }
    #empty-state.visible { display: flex; }
    .empty-icon {
      font-family: 'Material Symbols Outlined';
      font-size: 56px;
      color: var(--md-outline);
      opacity: 0.5;
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 48;
      line-height: 1;
    }
    .empty-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--md-on-surface-variant);
    }
    .empty-subtitle {
      font-family: 'Carlito', sans-serif;
      font-size: 0.9rem;
      color: var(--md-on-surface-variant);
      opacity: 0.7;
    }

    /* ── Welcome state ────────────────────────────── */
    #welcome-state { text-align: center; padding: 40px 16px; }
    .welcome-icon {
      font-family: 'Material Symbols Outlined';
      font-size: 56px;
      color: var(--md-primary);
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 48;
      line-height: 1;
      margin-bottom: 16px;
    }
    #welcome-state h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 1.4rem;
      color: var(--md-primary);
      margin-bottom: 10px;
    }
    #welcome-state p {
      font-family: 'Carlito', sans-serif;
      color: var(--md-on-surface-variant);
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto;
    }

    .stat-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    .stat-chip {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      background: var(--md-primary-container);
      color: var(--md-on-primary-container);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--md-outline-variant);
    }

    mark {
      background: #fff176;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Load more — MD3 Outlined Button ─────────── */
    #load-more {
      display: none;
      width: 100%;
      margin-top: 8px;
      padding: 0 24px;
      height: 40px;
      background: transparent;
      border: 1px solid var(--md-outline);
      color: var(--md-primary);
      border-radius: 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.1px;
      cursor: pointer;
      transition: background 200ms var(--md-curve);
    }
    #load-more:hover { background: rgba(5,15,65,0.08); }
    #load-more.visible { display: block; }

    /* ── Responsive ───────────────────────────────── */
    @media (min-width: 600px) {
      header { padding: 16px 24px 18px; }
      .header-title { font-size: 1.25rem; }
      main { padding: 12px 24px 20px; }
      .filter-tabs { padding: 12px 24px 0; }
    }
    @media (min-width: 800px) {
      header { padding: 16px 32px 18px; }
      main { padding: 12px 32px 24px; }
      .filter-tabs { padding: 12px 32px 0; }
    }
  </style>
</head>
<body>

<div id="progress-bar"><div id="progress-fill"></div></div>

<header id="app-header">
  <div class="header-top">
    <span class="header-icon material-symbols-outlined">monitor_heart</span>
    <div>
      <div class="header-title">CID-11</div>
      <div class="header-subtitle">Classificação Internacional de Doenças</div>
    </div>
  </div>
  <div class="search-box">
    <div class="search-leading-icon">
      <span class="material-symbols-outlined">search</span>
    </div>
    <input
      id="search-input"
      type="search"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      placeholder="Buscar por código CID ou nome da doença…"
      aria-label="Buscar CID-11"
    >
    <button id="clear-btn" aria-label="Limpar busca">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
</header>

<!-- Filter tabs -->
<div class="filter-tabs">
  <button class="filter-tab active" id="tab-search" aria-pressed="true">
    <span class="material-symbols-outlined">search</span>
    Busca
  </button>
  <button class="filter-tab" id="tab-favs" aria-pressed="false">
    <span class="material-symbols-outlined">favorite</span>
    Favoritos
    <span class="fav-count" id="fav-count">0</span>
  </button>
</div>

<main>
  <div id="status-bar"></div>

  <div id="loading">
    <svg class="md-circular-progress" viewBox="0 0 48 48">
      <circle/>
    </svg>
    <div class="loading-text">Carregando base CID-11…</div>
  </div>

  <div id="welcome-state" style="display:none">
    <div class="welcome-icon material-symbols-outlined">cardiology</div>
    <h2>Busca CID-11 em Português</h2>
    <p>Pesquise por código CID ou nome da doença na Classificação Internacional de Doenças — 11ª Revisão.</p>
    <div class="stat-chips" id="stat-chips"></div>
  </div>

  <div id="empty-state">
    <span class="empty-icon material-symbols-outlined">search_off</span>
    <div class="empty-title">Nenhum resultado encontrado</div>
    <div class="empty-subtitle" id="empty-subtitle">Tente outros termos de busca</div>
  </div>

  <div id="results"></div>
  <button id="load-more">Carregar mais resultados</button>
</main>

<script>
(function () {
  'use strict';

  let allItems  = [];
  let filtered  = [];
  let displayCount = 30;
  const PAGE_SIZE  = 30;

  // 'search' | 'favs'
  let activeTab = 'search';

  // Favorites — persisted in localStorage as a Set of keys (cid ?? name)
  const FAV_KEY = 'cid11_favs_v1';
  let favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));

  function saveFavs() {
    localStorage.setItem(FAV_KEY, JSON.stringify([...favorites]));
  }

  function itemKey(item) {
    return item.cid || item.name;
  }

  function isFav(item) {
    return favorites.has(itemKey(item));
  }

  function toggleFav(item) {
    const k = itemKey(item);
    if (favorites.has(k)) {
      favorites.delete(k);
    } else {
      favorites.add(k);
    }
    saveFavs();
    updateFavCount();
  }

  function updateFavCount() {
    const countEl = document.getElementById('fav-count');
    const n = favorites.size;
    countEl.textContent = n;
    countEl.classList.toggle('visible', n > 0);
  }

  // ── DOM refs ───────────────────────────────────────
  const searchInput  = document.getElementById('search-input');
  const clearBtn     = document.getElementById('clear-btn');
  const loadingEl    = document.getElementById('loading');
  const welcomeEl    = document.getElementById('welcome-state');
  const emptyEl      = document.getElementById('empty-state');
  const emptySubEl   = document.getElementById('empty-subtitle');
  const resultsEl    = document.getElementById('results');
  const statusBar    = document.getElementById('status-bar');
  const loadMoreBtn  = document.getElementById('load-more');
  const progressFill = document.getElementById('progress-fill');
  const statChips    = document.getElementById('stat-chips');
  const tabSearch    = document.getElementById('tab-search');
  const tabFavs      = document.getElementById('tab-favs');

  const COPY_ICON  = `<span class="material-symbols-outlined">content_copy</span>`;
  const CHECK_ICON = `<span class="material-symbols-outlined">check</span>`;

  // Sticky header shadow
  window.addEventListener('scroll', () => {
    document.getElementById('app-header').classList.toggle('scrolled', window.scrollY > 4);
  }, { passive: true });

  // ── Normalizers ────────────────────────────────────
  function stripAccents(s) {
    return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  }
  function lowerOnly(s) { return s.toLowerCase(); }
  function hasAccents(s) {
    return s.normalize('NFD') !== s.normalize('NFD').replace(/[̀-ͯ]/g, '');
  }

  // ── Data ───────────────────────────────────────────
  function flattenData(obj, path) {
    const items = [];
    for (const name of Object.keys(obj)) {
      const node = obj[name];
      if (!node || typeof node !== 'object') continue;
      const cid = (node.cid !== null && node.cid !== undefined && !Number.isNaN(node.cid))
        ? String(node.cid).trim() : null;
      const desc = (node.description !== null && node.description !== undefined && !Number.isNaN(node.description))
        ? String(node.description).trim() : '';
      items.push({ name: name.trim(), cid, description: desc, path: [...path] });
      if (node.subitens && typeof node.subitens === 'object') {
        for (const c of flattenData(node.subitens, [...path, name.trim()])) items.push(c);
      }
    }
    return items;
  }

  async function loadData() {
    try {
      progressFill.style.width = '20%';
      const resp = await fetch('./data.json');
      progressFill.style.width = '60%';
      const text = await resp.text();
      progressFill.style.width = '80%';
      const sanitized = text.replace(/:\s*NaN\b/g, ': null');
      const data = JSON.parse(sanitized);
      progressFill.style.width = '95%';
      allItems = flattenData(data, []);
      progressFill.style.width = '100%';
      setTimeout(() => { progressFill.style.width = '0%'; }, 400);
      const withCid = allItems.filter(i => i.cid).length;
      statChips.innerHTML = [
        `${allItems.length.toLocaleString('pt-BR')} itens`,
        `${withCid.toLocaleString('pt-BR')} com código CID`,
      ].map(s => `<span class="stat-chip">${s}</span>`).join('');
      updateFavCount();
      showWelcome();
    } catch (err) {
      loadingEl.innerHTML = `<div style="color:var(--md-error);text-align:center;padding:16px"><strong>Erro ao carregar data.json</strong><br><small>${err.message}</small></div>`;
    }
  }

  // ── UI helpers ─────────────────────────────────────
  function showWelcome() {
    loadingEl.style.display  = 'none';
    welcomeEl.style.display  = 'block';
    emptyEl.classList.remove('visible');
    loadMoreBtn.classList.remove('visible');
    statusBar.textContent = '';
    resultsEl.innerHTML = '';
  }

  function showEmpty(msg) {
    welcomeEl.style.display = 'none';
    emptyEl.classList.add('visible');
    emptySubEl.textContent = msg;
    loadMoreBtn.classList.remove('visible');
    statusBar.textContent = '';
    resultsEl.innerHTML = '';
  }

  function showResults() {
    welcomeEl.style.display = 'none';
    emptyEl.classList.remove('visible');
  }

  // ── Search ─────────────────────────────────────────
  function search(query) {
    const terms = query.trim().split(/\s+/).filter(Boolean);
    if (!terms.length) return allItems.slice();
    return allItems.filter(item => {
      const haystack     = [item.name, item.cid || ''].join(' ');
      const haystackLow  = lowerOnly(haystack);
      const haystackFlat = stripAccents(haystack);
      return terms.every(term =>
        hasAccents(term)
          ? haystackLow.includes(lowerOnly(term))
          : haystackFlat.includes(stripAccents(term))
      );
    });
  }

  // ── HTML helpers ───────────────────────────────────
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function highlight(text, query) {
    if (!query || !text) return escHtml(text || '');
    const terms = query.trim().split(/\s+/).filter(Boolean);
    if (!terms.length) return escHtml(text);
    let result = escHtml(text);
    for (const term of terms) {
      const re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      result = result.replace(re, m => `<mark>${m}</mark>`);
    }
    return result;
  }

  // ── Render ─────────────────────────────────────────
  function renderCards(query) {
    const slice = filtered.slice(0, displayCount);
    const frag = document.createDocumentFragment();
    for (const item of slice) frag.appendChild(buildCard(item, query));
    resultsEl.innerHTML = '';
    resultsEl.appendChild(frag);

    if (filtered.length > displayCount) {
      loadMoreBtn.textContent = `Carregar mais (${filtered.length - displayCount} restantes)`;
      loadMoreBtn.classList.add('visible');
    } else {
      loadMoreBtn.classList.remove('visible');
    }

    if (activeTab === 'favs') {
      statusBar.textContent = filtered.length
        ? `${filtered.length} favorito${filtered.length !== 1 ? 's' : ''}`
        : '';
    } else {
      statusBar.textContent = query && filtered.length
        ? `${filtered.length.toLocaleString('pt-BR')} resultado${filtered.length !== 1 ? 's' : ''}`
        : '';
    }
  }

  function buildCard(item, query) {
    const card = document.createElement('div');
    card.className = 'card';

    const badgeClass = item.cid ? 'cid-badge' : 'cid-badge category';
    const badgeText  = item.cid ? escHtml(item.cid) : 'CAT';
    const nameHtml   = highlight(item.name, query);
    const favActive  = isFav(item) ? ' active' : '';

    const descPreview = item.description
      ? `<div class="card-desc-preview">${escHtml(item.description.slice(0, 220))}${item.description.length > 220 ? '…' : ''}</div>`
      : '';

    const pathSlice = item.path.slice(-3);
    const breadcrumbHtml = pathSlice.length
      ? `<div class="card-breadcrumb">${pathSlice.map((p, i) =>
          (i > 0 ? '<span class="breadcrumb-sep">›</span>' : '') +
          `<span class="breadcrumb-item" title="${escHtml(p)}">${escHtml(p)}</span>`
        ).join('')}</div>`
      : '';

    const detailRows = [];
    if (item.cid) detailRows.push({ label: 'Código CID-11', value: item.cid, cls: 'detail-cid' });
    detailRows.push({ label: 'Nome', value: item.name, cls: '' });
    if (item.description) detailRows.push({ label: 'Descrição', value: item.description, cls: '' });

    const detailsHtml = detailRows.map(r => `
      <div class="detail-row">
        <div class="detail-body">
          <div class="detail-label">${r.label}</div>
          <div class="detail-value ${r.cls}">${escHtml(r.value)}</div>
        </div>
        <button class="copy-btn" data-copy="${escHtml(r.value)}" title="Copiar ${r.label.toLowerCase()}">${COPY_ICON}</button>
      </div>`).join('');

    card.innerHTML = `
      <div class="card-header">
        <span class="${badgeClass}">${badgeText}</span>
        <span class="card-name">${nameHtml}</span>
        <button class="fav-btn${favActive}" title="Favoritar" aria-label="Favoritar">
          <span class="material-symbols-outlined">favorite</span>
        </button>
        <span class="expand-icon material-symbols-outlined">keyboard_arrow_down</span>
      </div>
      ${breadcrumbHtml}
      ${descPreview}
      <div class="card-details"><div class="card-details-inner">${detailsHtml}</div></div>
    `;

    // Favorite button
    const favBtn = card.querySelector('.fav-btn');
    favBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFav(item);
      favBtn.classList.toggle('active', isFav(item));
      // If we're in favs tab and item was un-favorited, remove card with animation
      if (activeTab === 'favs' && !isFav(item)) {
        card.style.transition = 'opacity 200ms, transform 200ms';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.96)';
        setTimeout(() => {
          card.remove();
          // Update filtered list and status
          filtered = allItems.filter(i => isFav(i));
          statusBar.textContent = filtered.length
            ? `${filtered.length} favorito${filtered.length !== 1 ? 's' : ''}`
            : '';
          if (filtered.length === 0) {
            showEmpty('Nenhuma doença favoritada ainda');
          }
        }, 200);
      }
    });

    // Expand / collapse
    card.addEventListener('click', (e) => {
      if (e.target.closest('.fav-btn') || e.target.closest('.copy-btn')) return;
      const rect = card.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
      card.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove());
      card.classList.toggle('expanded');
    });

    // Copy buttons
    card.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(btn.dataset.copy).then(() => {
          btn.classList.add('copied');
          btn.innerHTML = CHECK_ICON;
          setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = COPY_ICON; }, 1500);
        });
      });
    });

    return card;
  }

  // ── Tab switching ──────────────────────────────────
  function setTab(tab) {
    activeTab = tab;
    tabSearch.classList.toggle('active', tab === 'search');
    tabSearch.setAttribute('aria-pressed', tab === 'search');
    tabFavs.classList.toggle('active', tab === 'favs');
    tabFavs.setAttribute('aria-pressed', tab === 'favs');

    displayCount = PAGE_SIZE;

    if (tab === 'favs') {
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      filtered = allItems.filter(i => isFav(i));
      if (filtered.length === 0) {
        showEmpty('Nenhuma doença favoritada ainda');
      } else {
        showResults();
        renderCards('');
      }
    } else {
      // Back to search — show welcome
      filtered = [];
      showWelcome();
    }
  }

  tabSearch.addEventListener('click', () => setTab('search'));
  tabFavs.addEventListener('click',   () => setTab('favs'));

  // ── Search handler ─────────────────────────────────
  let debounceTimer;
  function handleSearch() {
    if (activeTab !== 'search') return;
    const query = searchInput.value.trim();
    clearBtn.classList.toggle('visible', query.length > 0);
    if (!query) {
      displayCount = PAGE_SIZE;
      showWelcome();
      return;
    }
    filtered = search(query);
    displayCount = PAGE_SIZE;
    if (filtered.length === 0) {
      showEmpty(`Nenhum resultado para "${query}"`);
    } else {
      showResults();
      renderCards(query);
    }
  }

  searchInput.addEventListener('input', () => {
    if (activeTab !== 'search') setTab('search');
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(handleSearch, 200);
  });

  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.classList.remove('visible');
    searchInput.focus();
    handleSearch();
  });

  loadMoreBtn.addEventListener('click', () => {
    displayCount += PAGE_SIZE;
    renderCards(activeTab === 'favs' ? '' : searchInput.value.trim());
  });

  loadData();
})();
</script>
</body>
</html>
